body:
  text: 談苑卷一宋孔平仲撰張鄧公吕許公同作宰相一日朝退仁宗獨留吕公問曰張士遜久在政府欲與一差遣出去吕公曰士遜出入兩朝亦頗宣力仁宗曰恩命如何吕公曰與除靜江軍節度使檢校太傅知許州仁宗曰不虧它否吕公曰聖恩優厚吕公既退張吕親姻也私焉曰主上獨留公必是士遜别有差遣因祈以恩命吕沈吟久之曰使弼使弼張亦欣然慰望是日張公打屏閣子內物色過半矣既夕鎖院明日早張公令院子盡般閣子內物色歸家更不趨待漏院只就審官東院待漏既入朝張公唯祗候宣麻吕公唯凖擬押麻耳忽有堂吏報吕公云相公知許州吕公大驚于是張公押麻乃吕公除靜江軍節度使檢校太傅知許州也太祖朝都知押班皆以供奉官為之內中祗應裹頭巾衣褐衫而已仁宗朝王守忠官至留後乞綴本品班赴宴閣門從之自知未允辭而不赴禁中近清明節神宗侍曹太皇因語自來却無人做珠子鞍轡雖云太華然亦好也太皇聞此語已密令人描樣矣不數日實促就珠子鞍轡傳宣索玉鞍轡一副神宗莫測所欲用亦莫敢問依旨進入太后令送後苑拆修遂施珠韀焉其上作小紅羅銷金坐子劣可容體甫近上已以鞍架載之送神宗神宗大感悅取小烏馬于福寧殿親試之駕幸金明池回遂乘此韀士論皆謂雖神宗絶孝亦光獻至慈上下相得以成其美焉光獻太皇太后疾病稍間神宗親製一小輦極為輕巧以珠玉黃金飾之進于太皇曰娘娘試乘此輦往涼殿散心太皇曰今日意思無事天氣亦好遂載而之涼殿太后扶其左神宗扶其右太皇下輦曰官家太后親自扶輦當時在曹家作女時安知有今日之盛喜見顔色王正仲進光獻挽詞云珠韉錫御恩猶在玉輦親扶事已空蓋用此兩事也韉音箋有一朝士因宰相生日獻詩卒章云長居廊廟福蒼生朱巽草制云某官夙負官材真宗令出典藩丁崖州雖險詐然亦有長者言真宗嘗怒一朝士再三言之謂稍退不答上作色曰如此叵耐輒問不應謂進曰雷霆之下臣若更加一言則虀粉矣真宗欣然嘉納楊大年與王文穆不相得在館中文穆或繼至大年必徑出它處亦然如𡊮盎朝錯也文穆去朝士皆有詩獨文公不作文穆辭日奏真廟傳宣令作詩竟不肯送真宗將立明肅作后令丁謂諭旨于楊大年令作册文丁云不憂不富貴大年答曰如此富貴亦不願王旦相罕接見賔客惟大年來則對榻臥談卒時屬其家事一付大年丁晉公來求昏大年令絶之王文正公以清德事真皇上特敬重一日御宴陳設鮮華旦顧視意色不悅上已覺其如此至中休命左右以舊陳設易之矣蘇軾以吟詩有譏訕言事官章疏狎上朝廷下御史臺差官追取是時李定為中書丞對人太息以為人才難得求一可使逮軾者少有如意于是太常博士皇甫僎被遣以往僎携一子二臺卒倍道疾馳駙馬都尉王詵與子瞻遊厚密遣人報蘇轍轍時為南京幕官乃亟走介往湖州報軾而僎行如飛不可及至潤州適以子病求醫留半日故所遣人得先之僎至之日軾在告祖無頗權州事僎徑入州廨具鞾袍秉笏立庭下二臺卒夾侍白衣青巾顧盼儜惡人心洶洶不可測軾恐不敢出乃謀之無頗無頗云事至于此無可奈何須出見之軾議所以服自以為得罪不可以朝服無頗云未知罪名當以朝服見也軾亦具靴袍秉笏立庭下無頗與職官皆小幘列軾後二卒懷臺牒拄其衣若匕首然僎又久之不語人心益疑懼軾曰軾自來激惱朝廷多今日必是賜死死固不辭乞歸與家人訣别僎始肯言曰不至如此無頗乃前曰太博必有被受文字僎問誰何無頗曰無頗是權州僎乃以臺牒授之及開視之只是尋常追攝行遣耳僎促軾行二獄卒就執之即時出城登舟郡人送之雨泣頃刻之間拉一太守如驅犬雞此事無頗目擊也吕申公作相宋鄭公參知政事吕素不悅范希文一日希文答元昊書録本奏呈吕在中書自語曰豈有邉將與叛臣通書又云奏本如此又不知真所與書中何所言也以此激宋宋明日上殿果入劄子論希文交通叛臣既而中書將上吕公讀訖仁宗沉吟久之遍顧大臣無有對者仁宗曰范仲淹莫不至如此吕公徐應曰擅答書不得無罪然謂之有它心則非也宋公色沮無辭明日宋公出知揚州又二年希文作參知政事宋尚在揚極懷憂撓以長書謝過云為憸人所使其後宋公作相薦范純仁試館職純仁尚以父前故辭不願舉蘇子瞻隨皇甫僎追攝至太湖鱸香亭下以柁損修牢是夕風濤傾倒月色如晝子瞻自惟倉卒被拉去事不可測必是下吏所連逮者多如閉目窣身入水頃刻間耳既為此計又復思曰不欲辜負老弟弟謂子由也言已有不幸則子由必不獨生也由是至京師下御史獄李定舒亶何正臣雜治之侵之甚急欲加以指斥之罪子瞻憂在必死嘗服青金丹即收其餘窖之土中以備一旦當死則併服以自殺有一獄卒仁而有禮事子瞻甚謹每夕必然湯為子瞻濯足子瞻以誠謁之曰軾必死有老弟在外他日託以二詩為訣獄卒曰學士必不至如此子瞻曰使軾萬一獲免則無所恨如其不免而此詩不逹則目不瞑矣獄卒受其詩藏之枕中其一詩曰聖主寬容德似春小臣孤直自危身百年未了先償債十口無依更纍人是處青山可藏骨他年夜雨獨傷神與君世世為兄弟更結人間未了因其後子瞻謫黃州獄卒曰還學士此詩子由以面伏案不忍讀也子瞻好與子由夜話對榻臥聽雨聲故詩載其事子瞻既出又戲自和云却對酒杯渾似夢試拈詩筆已如神子瞻以詩句被劾既作此詩私自罵曰猶不改也皇甫僎追取蘇軾也乞逐夜所至送所司案禁上不許以為只是根究吟詩事不消如此其始彈劾之峻追取之暴人皆為軾憂之至是乃知軾必不死也其後果然天子聰明寬厚待臣下有禮而小人迎望要為深刻如僎類者可勝計哉有人問秀州崇德縣民長官清否答曰漿水色言不清不濁也秀州華亭鶴胎生者真鶴也形體緊小不食魚蝦惟食稻梁人餧以飯則食之其體大好食魚蝦啄蛇鼠者鸛合所生乃卵生也食稻梁者雖甚馴熟久須飛去惟食魚蝦者不能去耳河豚瞑目切齒其狀可惡不中度多死棄其腸與子飛鳥不食誤食必死登州瀕海人取其白肉為脯先以海水淨洗換海水浸之暴于日中以重物壓其上須候四日乃去所壓之物傅之以鹽再暴乃成如不及四日則肉猶活也太守李大夫嘗以三日去所壓之物俄頃肉自盆中躍出乃知瀹之不熟真能殺人也松江鱸魚長橋南所出者四腮天生膾材也味美肉緊切至終日色不變橋北近崑山大江入海所出者三腮味帶鹹肉稍慢回不及松江所出虢石重重紫白相間以筆描紫上緩手剖之紫去白見隨意所欲作何物象至于林木亦可以藥筆為之以手試之有參差齟齬者皆偽物也枇杷須接乃為佳果一接核小如丁香荔枝再接遂無核也京師有畜鐡鏡者謂人曰此竒物也以照人手則指端見有白氣以氣之長短驗人之夀夭好事者乃以厚價取之既而詢之博物者曰此造作也蓋磨鏡時只以往手無以來手則照指自見其端有如氣者耳相船之法頭髙于身者謂之望路如是者凶雙板者凶隻板者吉隻板謂五板七板雙板謂六板八板以船底板數之也造屋主人不恤匠者則匠者以法魘主人木上鋭下壯乃削大就小倒植之如是者凶以皂角木作門關如是者凶許敏明州人張唐卿榜第一甲及第為大理評事知縣嘗因用刑箠殺人其後寃屢見但相去尚逺經二十年敏以太常博士通判蘇州其寃漸近稍如榻與敏夫婦同寢其始敏夫婦在外寃卧于內既而間隔卧于夫婦之間知其為鬼無如之何也是時詔索天下御容令轉運司差官護送入京敏與太守林大卿不協于上司求行自京師歸至汴上青陽驛其寃逼之敏死驛中鍾著作生二女長嫁宋氏生庠祁其季嫁常州薛秀才生一女為尼與僧居和大師私焉亦生一女嫁潘秀才潘有子名與稽今為朝奉大夫與稽之視居和乃外祖父也居和乃以牛黃丸療風疾者也飲酒食肉不守僧戒然用心吉良每鄉里疾疫以藥歷詣諸家救其所苦或以錢賙之薛尼於宋氏以姊妹親常至京師是時庠為翰林學士尼還常州和病問尼曰京師諸為名族善人者尼曰吾所出入多矣無如宋內翰家也和曰我死則往託生焉尼誚曰狂僧宋家郡君已娠矣安得託生和曰吾必往也既而和死人畫一草蟲于其臂是日宋家郡君腹痛將娩祁之妻往視産見一紫衣僧入室亟走避之既而聞兒啼曰急令僧去吾將視吾姒人曰未嘗有僧也乃知所生子乃和也既長形相酷似和亦好飲酒食肉隱然有草蟲在其臂名均國為絳州太守卒偷能禁犬使不吠惟牝犬不可禁也或云紋如虎斑亦難禁髙若訥能醫以鍾乳飼牛飲其乳後患血痢卒或云冷暖相薄使然韶州岑水場往歲銅發掘地二十餘丈即見銅今銅益少掘地益深至七八十丈役夫云地中變怪至多有冷煙氣中人即死役夫掘地而入必以長竹筒端置火先試之如火焰青即是冷煙氣也急避之勿前乃免有地火自地中出一出數百丈能燎人役夫亟以面合地令火自背而過乃免有臭氣至腥惡人間所無者也忽有異香芬馥亦人間所無者也地中所出沙土運置之穴外為風所吹即火起焰焰然蝨不南行隂類也其性畏火置之物上隨其所向以指南方俄即避之若有知也種竹就西北其根無不向東南行者是亦物之性也江東蘆賤而荻貴退灘之地先一年所生者蘆也明年所生者荻也張安道言嘗使北遼方燕遼主在廷下打毬安道見其纓紱諸物鮮明有異知其為遼主也不敢顯言但再三咨其藝之精爾接伴劉六符意覺安道知之色甚怍云又與一日做六論不同矣契丹鴨渌水牛魚鰾製為魚形婦人以綴面花遼人尤畏女真國范純禮嘗聞彼使云女真國人長馬大其境土之廣南北不知幾千里也徐禧覆於永洛是時遼人方苦女真侵邉故帖然自守不敢為中國患收冰之法冬至前所收者堅而耐久冬至後所收者多不堅也黃河亦必以冬至前凍合冬至後雖凍不復合矣川子乳糖師子冬至前造者色白不壞冬至後者易敗多蛀陽氣入物其理如此華山下有西嶽行宫祈禱甚盛雲臺觀常以道士一人主之有一道士以施利市酒食畜婦人巡檢姓馬者知而持之共享其利一夕道士夢為官司所録送五道將軍殿中并追馬勘鞠獄具各決杖七十既寤覺脊間微疼潰而為瘡自知不祥亟往詣馬馬亦在告矣問其夢中所見皆同馬亦疽發于背二人俱卒虢州朱陽鎮一夕鳬鴈之聲滿空其鳴甚悲逮旦鳬鴈死于野中無數或斷頭或折翅或全無所傷而血汚其喙村民載之入市市人不敢買蓋此鎮未嘗有此物怪之也又一年王沖叛朱陽之民殲焉象耳中有油出謂之山性發往往奔逸傷人牧者視象耳有油出則多以索靡之矣京師語曰宣醫喪命勑葬破家蓋所遣醫官云某奉勑來須奏服藥加減次第往往必令餌其藥至死而後已勑葬之家使副洗手帨巾每人白羅三匹它物可知也元祐中韓康公病革宣醫視之進金液丹雖暫能飲食然公老年真氣衰不能制客陽竟以薨背朝廷遣使問後事病亂中誤諾勑葬其後子姪辭焉王彥祖學士自言初到南省試天子全玉賦夢中有人告之云天字在上不順天字在下則順矣須三次如此是歲省下第後過省乃嚴父莫大於配天賦及第乃圓丘象天賦又二十七年自嶺南知雷州召為館職試明王謹于尊天賦凡三次題目皆天字在下彥祖名汾今為朝議大夫集賢校理宗室至一品殯葬朝廷遣禮官軷祭舊制知太常禮院官以次行事得絹五十匹陳侗陳汝羲俱在禮院因朝會見一皇親年老行遲侗私語曰可軷矣汝羲自後排之曰次未當公此吾物也傳者以為笑自元豐官制行太常博士專領軷祭所得絹四博士共之行事十四匹餘十二匹有數皇親聨騎而出呵殿甚盛一博士戲謂同列曰此皆軷材也王雱丞相舒公之子不惠有妻未嘗接其舅姑憐而嫁之雱自若也侯叔獻再娶而悍一旦而獻卒朝廷慮其虐前夫之子有旨出之不得為侯氏妻時京師有語云王太祝生前嫁婦侯兵部死後休妻羌人以自計搆相君臣謂之立文法以心順為心白人以心逆為心黑人自稱曰倘謂僧曰尊最重佛法居者皆板屋惟以瓦屋處佛人好誦經不甚鬭爭王子醇之取熙河殺戮甚衆其實易與耳有一定僧在山谷中漢軍執之此僧曰吾有銀與汝勿殺我也漢軍受其銀斬其首白乳涌出夏竦嘗統師西伐揭榜塞上云有得趙元昊頭者賞錢五百萬貫爵為西平王元昊使人入市賣箔陜西荻箔甚髙倚之食肆門外佯為食訖遺去至晚食肆竊喜以為有所獲也徐展之乃元昊購竦之榜懸箔之端云有得夏竦之頭者賞錢兩貫文比竦聞之急令藏掩而已喧播逺近矣竦大慚沮竦集幕職兵官議五路進討凡五晝夜屏人絶吏所謀祕密處置軍馬分擘糧草皆有文字已成書兩人之力不能舉封鑰於一大匱中一夕失之竦進兵之議遂格由此懇乞解罷得知蔡州其後韓絳西討河東起兵八萬人時太原遣卒三千皆丁壯強硬令至軍前交割曉夕奔走飢不得食困不得息既而班師不用遣還形已如鬼風吹即仆假使見敵則不戰成擒矣元豐四年西伐西人逺引清野以老我師髙遵裕領衆深入不見一人一騎直扣靈武靈武壁甚堅若有守者我師營漢中治攻具西人約降遵裕信之駐軍五日不進故彼得為計中夕決河水至我師潰焉故責遵裕知坊州詞云比以兩路鋭兵進攻靈武而亡士潰卒職汝寡謀遵裕再責郢州安置夏竦薨子安期奔喪至京師館中同舍謁見不哭坐榻茶槖如平時又不引客入奠人皆訝之戊戌年安期死數日子伯孫猶著衫帽接客無毁容愈肥澤焉邢昺疾亟車駕幸其第其子于恩澤并乞不敕葬王居白待制病猶子侍疾祈遺表奏薦焉張詠自益州寄書與楊大年進奏院監官竊計之云益州近經寇亂大臣密書相遺恐纍我發視之無它語紙尾批云近日白超用事否乃繳奏之真宗初亦訝之以示寇凖凖微笑曰臣知開封府有伍伯姓白能用杖都下但翹楚者以白超目之每飲席浮大觥遂以為况真宗方悟而笑熊伯通有平蠻之功太常卿范純禮言至蜀中親聞其事涓井蠻本誘之降降者百餘人本授計主簿程之元兵官玉宣令毒之本猶慮其變也艤舟三十里外待之密約云若事諧走馬相報元之等以曼陀羅花醉降者稍稍就擒令走馬報本本急拏舟順嘉陵江而下頃刻至禽所斬尚未已也本就收此功朝廷賞擢以制兩廣雄霸沿邉塘泊冬月載蒲葦悉用凌牀官員亦乘之藝祖載誕營中三日香人莫不驚異至今洛中人呼應天禪院為香孩兒營熙寧中張唐民登對其歸美上德之辭云臣尋常只見紙上堯舜今日乃見活堯舜也談苑卷一
