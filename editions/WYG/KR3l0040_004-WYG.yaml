body:
  text: 談苑卷四宋孔平仲撰太祖大燕雨暴作上不悦趙普奏曰外面百姓正望雨官家大燕何妨只是損得此陳設濕得此樂官衣裳但令雨中作雜劇更可笑此時雨難得百姓快活時正好飲酒燕樂太祖大喜宣令雨中作樂宣勸滿飲盡歡而罷閣下法帖十卷淳化中所集其中多弔喪問疾唐國子祭酒李浩所撰刋誤云短啟出于晉宋兵革之餘時國禁書疏非弔喪問疾不得輒行尺牘故羲之書首云死罪是違制令也前世錢文未有草書者淳化中太宗始以宸翰為之既成以賜近臣王元之有詩云謫官無俸突無烟唯擁琴書盡日眠還有一般勝趙壹嚢中猶貯御書錢元祐中元夕上御樓觀燈有御製詩時王禹玉蔡持正為左右相持正叩禹玉云應制上元詩如何使故事禹玉曰鰲山鳳輦外不可使章子厚笑曰此誰不知後兩日登對上獨賞禹玉詩云妙於使事詩云雪消華月滿僊䑓萬燭當樓寳扇開雙鳳雲中扶輦下六鰲海上駕山来鎬京春酒沾周宴汾水秋風陋漢才一曲昇平人盡樂君王又進紫霞杯是夕以髙麗進樂又添一杯山谷作茶磨銘云楚雲散盡燕山雪飛江湖歸夢従此祛機京師上元放燈三夕錢氏納土進錢買兩夜今十七十八夜是也陶榖久在翰林意希大用其黨因對言榖宣力實多微伺上㫖太祖曰翰林草制皆檢前人舊本俗所謂依様畵葫蘆耳何宣力之有榖作詩曰官職須由生處有才能不管用時無堪笑翰林陶學士年年依様畫葫蘆真宗次澶淵曰敵騎未退天雄軍横截其後萬一陥沒則河朔皆敵土也何人為朕守魏公曰智將不如福將王欽若福禄未艾宜以為守王公聞命􅃼然自失魏公酌大白飲之曰上馬杯且曰參政勉之不日即為同列王入魏敵騎滿野屯塞四門終日兀坐越七日敵退召為平章事陳恭公判亳州遇生日親族多獻老人星圖姪世修獨獻范蠡游五湖圗且賛曰賢哉陶朱霸越平吳名遂身退扁舟五湖公即日納節明日致仕太祖嘗與趙普議事不合上曰安得宰相如桑維翰者與之謀乎普曰使維翰在陛下亦不用盖維翰愛錢也上曰茍用其長當䕶其短措大眼孔小賜與十萬貫則塞破屋子矣慈聖光獻皇后薨上悲慕甚有姜識自言神術可使死者復生上試其術數旬不效乃曰臣見太皇太后方與仁宗宴臨白玉欄干賞牡丹無意復来人間也上知誕妄但斥於郴州蔡承禧進挽詞曰天上玉欄花已折人間方士術何施慶厯中西師末解晏元獻為樞密使大雪置酒西園歐陽永叔賦詩云須憐鐡甲冷徹骨四十餘萬屯邉兵晏曰昔韓愈亦能作言語赴裴度會但云園林窮勝事鐘鼓樂清時不曽如此合閙舊制宰相早朝上殿命坐有軍國大事則議之従容賜茶而退自餘號令除拜刑賞廢置事無巨細並執状進入止於禁中親覽批紙尾用御寳可其奏謂之印畫降出奉行自唐至五代其制不改古所謂坐而論道者也國初范質王溥等自以前朝舊相居不自安共奏請中書庶務大者具劄子面取進止朝退各行其事自是奏御浸多或至旰昃賜坐啜茶之禮遂廢固不暇於論道矣遂為定制太祖以神武定天下儒學之士未甚進用及卜郊乗大輅翰林學士盧多遜執綏偹顧問占對詳敏他日上曰作宰相當用儒者盧果大用真宗詔种放至闕韋布長揖宰執楊大年嘲曰不把一言裨萬乗秪义雙手揖三公上召楊曰卿安知無一言裨朕乎出皁嚢十軸書乃放所奏也書曰十議所謂議道議徳議仁議義議兵議刑議政議賦議安議危億曰臣當負荆謝之楊大年年十一舉神童至闕下叅政李至喜令賦朝京闕詩有云七閩波𣺌邈雙闕氣岧嶤曉登雲外嶺夜渡月中潮斷句云願秉清忠節終身立聖朝元祐中祕閣上巳日集西池王仲至有詩張文濳和最工云翠浪有聲黄繖動春風無力彩衫垂秦少游云簾幙千家錦繡垂王笑曰又待入小石調也太宗善奕棋諌臣乞竄待詔賈𤣥於南州者言𤣥每進新圖妙勢悦惑明主恐壅遏萬幾上曰朕非不知聊避六宫之惑耳太宗三子真宗第三封夀王詔一異僧徧相諸公僧已見七王惟夀王未起僧奏曰徧覲諸公皆不及夀王上曰卿未見安知之僧曰適見三僕立于門皆將相材器其僕即爾主可知矣三僕乃張相耆楊相崇勲郭太尉承祐也李侍讀仲容善飲號李萬囘真宗飲量無敵欲對飲則召公一夕上命巨觥仲容曰告官家免巨觥上因問何故謂天子為官家仲容述蔣濟萬幾論三皇官天下五帝家天下兼皇帝之徳故曰官家上大喜曰真所謂君臣千載一遇也陳文惠公堯佐與弟堯叟俱位至宰相弟堯咨尤精弧矢自號小由基祥符中守荆南囘其母馮氏曰汝典名藩有何異政堯咨曰路當衝要將迎殆無虚日然弓矢衆無不服母曰汝父以忠孝裨補國家不務仁政善化而專卒伍一夫之役以杖杖之金魚墜地太祖問王官侍講曰秦王學業何如曰近日所作文詞甚好上曰帝王家兒不必要㑹文章但令通曉經義知古今治亂他日免為侮文弄法吏欺罔耳古者三公開閤而郡守比古諸侯亦有閤故有閤下之稱前輩與大官書多呼執事與足下劉子元與宰相書曰足下韓退之與張僕射書曰執事即其例也記室本王侯賔佐之稱他人不可通用惟執事則指左右之人尊卑皆可通稱及自卑逹如云座前尤非也閤下降殿下一等座前降几前一等豈可僭用哉韓魏公知泰州卧疾數日忽曰適夢以手捧天者再其後援英宗於藩邸翼神廟於春宫國朝翰林學士佩金帶朱衣吏一人前道兩府則兩人笏頭帶佩魚曰重金居兩制久者則曰眼前何日赤腰下甚時黄處内庭久者又曰眼赤何時兩腰黄甚日重李藩未第時有僧告曰公是紗籠中人藩問其故曰凡宰相𠖇司必立其像以紗籠䕶之後果至台輔昆吾山有獸如兔食銅鐡膽腎皆如鐡吳國武庫中兵刃俱盡而封署如故得雙兔殺之有鐡膽腎方知兵刃為食乃鑄腎為二劍雄為干將雌為莫耶王嚴光有才不逹自號釣鰲客廵遊都邑求麻鐡之資以造釣具有不應者輒録姓名置篋中曰下釣時取此等懞漢為餌其狂誕𩔖此張祜謁李紳亦稱釣鰲客李怒曰既解釣鰲以何為竿曰以虹為竿以何為鈎曰以日月為鈎以何為餌曰以短李相為餌紳黙然厚贈之士人初登第必展歡宴謂之燒尾説者云虎化為人惟尾不化須為燒去乃得成人又説新羊入羣諸羊抵觸不相親附燒其尾乃定又説魚躍龍門化龍時必須雷電為燒其尾乃化李封為延陵令吏人有罪不加杖罰但令裹碧巾以辱之州鄉大以為恥竟不捶一人葉法善有道術居𤣥真觀一日會數朝士滿座思酒忽有一人敲門稱麴秀才突入坐少年秀美談論不凡法善濳以小劍擊之應手墮地化為瓶榼中有美酒遂共飲之皆曰麴生風味不可忘也韓退之詩云且宜勤買抛青春國史補云酒有郢之富水烏程之若下滎陽之土窟春富平之石凍春劍南之燒春杜子美詩云聞道雲南麴米春裴鉶傳竒亦有酒名松醪春乃知唐人名酒多以春桞子厚詩云盛時一失貴反賤桃笙葵扇安可常不知桃笙為何物因閲方言宋魏之間簟謂之笙乃悟桃笙以桃竹為簟也歐公嘗曰少時有僧相我耳白于面名聞天下脣不著齒無事得謗其言頗騐耳白于面則衆所共見脣不著齒余不敢問公不知何也睂州有人家畜數百魚深池中以塼甃四圍皆屋凡三十餘年一日天晴無雷池中忽發大聲如風雨皆躍起羊角而上不知所往舊説不以龜守則為蛟龍所取余以謂蛟龍必因風雨疑此魚圏局三十餘年日有騰㧞之志精神不衰久而自然逹理上元燃燈或云沿漢祠太一自昬至晝故事梁簡文帝有列燈賦陳後主有光壁殿遥詠山燈詩唐明皇先天中東都設燈文宗開成中以燈迎太后則是唐以前歲不常設唐日厯上元三年三月勑云制勑施行既為永式皆白紙多有蠧食自今尚書省頒下諸司及州下縣竝用黄紙書之唐徐堅撰初學記中山劉子儀愛其書曰非止初學真可為終身記耳吕蒙正方應舉就舍建隆觀㳂幹入洛鎖室而去自冬渉春方囘啓戸視之牀前槐枝叢生高二三尺蒙茸合抱是年登科十年作相唐内庫有青酒杯紋如亂􅁝其薄如紙以酒注之温温然有氣相次如沸湯名之曰自暖杯龜兹國進一枕色如馬腦枕之則十洲三島四海五湖盡在夢中明皇因名為游仙枕李太白少時夢筆頭生花後天才贍逸名聞天下新進士及第以泥金書帖子報其家謂之喜信至文宗時遂寝此儀宫中寒食時競立鞦韆為樂明皇呼為半仙之戲宋璟愛民恤物時人謂之有脚陽春言所至之處如陽春及物也李白與人談論皆成句讀如春葩麗藻燦于齒牙時人號為粲花之論都人士女正月十五後乗車跨馬郊野中為探春之宴唐明皇命相先以八分書書姓名金甌覆之有書生謁李林甫云管子文後化為筆郭子儀自同州歸詔大臣就宅作軟脚局院中有雙鵲棲於玉堂之後海棠樹每學士會食必徘徊翔集或鳴噪必有大詔令或宣召之事因謂之靈鵲故晁翰林詩云却聞靈鵲心應喜并予詩云靈鵲先依玉樹棲蓋為此也賞花釣魚三館惟直館預坐校理以下賦詩而退太宗時李宗諤為校理作詩云戴了宫花賦了詩不容重見赭黄衣無憀却出宫門去還似當年下第時上即令赴宴自是校理而下皆與會也祥符八年蔡文忠状元及第上視其秀偉顧宰相曰得人矣因詔金吾給騶從傳呼状元始于此也吕公弼申公之次子始秦國妊娠而疾將去之醫工陳遜煑藥將熟已三鼓坐而假寐忽然鼎覆再煑再覆方就榻夢神人被金甲持劍叱曰在胞者本朝宰相汝何人也敢以毒加害遜懼而悟以白相國後生公弼熈寧中位樞密使前輩作花詩多比美女如曰若教解語應傾國任是無情也動人黄魯直酴䕷詩云露濕何即試湯餅日烘荀令炷爐香乃比美丈夫淵材作海棠詩云雨過温泉浴妃子露濃湯餅試何郎意尤工也元厚之少時夢人告曰異日須兄弟數人同在翰林厚之自思素無兄弟疑夢不然熈寧中學士者五人先後同在翰林韓持國維陳和叔繹鄧文約綰楊元素繪并厚之名皆從系始悟兄弟之説古者未有紙削竹木以書姓名故謂之刺後以紙書故謂之名紙唐李徳裕為相極其貴盛人之加禮改具銜候起居之状謂之門状後趙石季龍置戲馬觀觀上安詔書用五色紙銜于木鳳之口而頒行之故羅隠曰鎖闥千里更無人到絲綸五色惟其鳳銜古者朝宴衮服中有白紗中單百官郊享服中有明衣皆汗逐之状漢髙祖與項羽戰争之際汗透中單改名汗衫三代以韋爲筭袋盛筭子及小刀磨石等魏易爲龜袋唐永徽中四品官竝給隨身魚天后改魚爲龜唐初卿大夫沒追取魚袋永徽中勑生平在官用爲褒飾沒則収之情意不忍五品以上薨魚更不追取古有革帶反揷垂頭秦二世始名腰帶唐髙祖詔令向下揷垂頭取順下之義官銜之名當時選曹補授須存資歴開奏之時先具舊官名品於前次書擬官於後使新舊相銜不斷故曰官銜亦曰頭銜如人口銜物取其連續之意如馬有銜以制其首前馬已進後馬續来相次不絶古人謂之銜尾相屬即其義也婦人面飾用花子起自上官昭容以掩㸃跡大厯以前士大夫妻多妬悍者婢妾小不如意輒印面故有月㸃錢梁職儀八座尚書以紫紗裹手版垂白絲於首如筆通志曰僕射尚書手版以紫衣裹之名曰笏梁中世以来唯八座執笏者白筆綴頭以紫嚢之其餘公卿但執手版陳希烈不便執笏騎馬以帛裹令左右執之于右座云便爲將来故事蔡州丁氏精於女工每七夕禱以酒果忽見流星墜筵中明日𤓰上得金梭自是巧思益進寇莱公守北門遼使經由問曰相公望重何以不在中書答曰主上以朝廷無事北門鎖鑰非凖不可齊李崇爲兖州刺史州多盗崇乃村置一樓樓懸一鼓盗發之處槌鼓亂擊諸村始聞者撾鼓一通次聞者復撾以爲莭俄頃之間聲布百里伏其險要無不擒獲諸村置鼓樓自此始也宋孝王問司天膺之後魏北齊赦日樹金雞事膺之曰按海中星占云天雞星動爲有赦北齊赦日令武庫設金雞於闕門右撾鼓千聲宣赦建金雞或云起於西京吕光究其旨盖西方主兊爲澤雞者巽之神巽爲號令故合二物制其形揭長竿使衆人覩之選人不得乗馬入宫門天聖中選人爲館職始歐陽永叔輩皆自左掖門下馬入館時號歩行學士江南徐鉉善小映日視之書中心有一縷濃墨正當其中至屈折處亦當中無偏側乃筆鋒直下不倒側故鋒常在畫中此用筆之法也古人以散筆作隷書謂之散隷蔡君謨以散筆作草書謂之散草或曰飛草其法皆生於飛白亦自成一家也北方有白鴈似鴈而小色白秋深至則霜降河北人謂之霜信杜甫詩云故國霜前白鴈来即此意也老杜詩曰笋根稚子無人見唐人食笋詩云稚子脱錦棚駢頭玉香滑則稚子爲笋明矣故一名曰稚子白樂天每作詩令一老嫗解之問曰解否嫗曰解則録之不解則又改之故唐末之詩近于鄙俚太宗好文每進士及第賜聞喜宴御製詩遂爲故事仁宗詩尤多有云寒儒逢景運報國合何如今人謂駔儈爲牙本謂之互郎主互市事也唐人書互作牙牙似牙字因轉爲牙今人謂萬爲方千為撇但數目可按故能存本字不然亦若牙牙耳山谷云作詩正如雜劇初時布置臨了須打諢方是出塲盖是讀秦少章詩惡其終篇無所歸也謝朓云好詩圓羙流轉如彈丸故東坡云中有清圓句銅丸飛柘彈盖詩貴圓也然圓熟多失之平易老硬多失之乾枯能不失二者之間則可與古詩者竝驅矣王元長曰小兒五歲曰鳩車之戯七歲曰竹馬之游談苑卷四
