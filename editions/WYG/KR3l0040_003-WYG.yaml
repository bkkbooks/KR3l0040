body:
  text: 談苑卷三宋孔平仲撰真宗上僊明肅召兩府入諭之一時號泣明肅曰有日哭在且聽處分議畢王曾作參政當秉筆至云淑妃為皇太妃曾卓筆云適来不聞此語丁崖州曰遺詔可改邪衆皆不敢言明肅亦知之始惡丁而嘉王曾之直也澶淵之幸陳堯叟有西蜀之議王欽若賛金陵之行持遲未決遣訪宼凖凖云惟有熱血相潑爾浸潤者云殊無愛君之心講和之後兵息民安天意悦豫而欽若激以城下之盟欲報東門之役既弗之許則説以神道設教鎮服人心祥符中所講禮文悉起於此也丁謂在崖州方奕棋其子哭而入云適聞有中使渡海將至矣謂笑曰此王欽若使人来嚇我爾使至謝恩畢乃傳宣撫問夏守恩作殿帥舊例諸營馬糞錢分納諸帥守恩受之夫人别要一分王徳用作都虞候獨不受又章獻上僊内官請坐甲王獨以為不須興國寺東火張耆樞相宅近須兵防衛王不與以此數事作樞宻副使省試王射虎侯賦云講君子必争之藝飾大人所變之皮貴老為其近於親賦云覩兹黄耉之状𩔖我嚴君之容試官大噱永叔云開封多為皇親所擾送一卒云為鵓鴿飛而不下韓魏公嘗夢崔侍郎在客位及覺問客將有何官客云崔縣尉在客位乃崔台符也台符明法出身致位通顯官制行合作尚書而只除刑部侍郎寄禄至光禄大夫後奪一官終於正議大夫正議大夫亦侍郎也魏氏有李後主畫竹題跋甚多其一云宗孟噪清臣誠同一觀又有李書云元豐卒酉清明後三日中書昭文位觀傳正􅃉明邦直志道三公執政張誠一武人用事者耳程戡侍即自言為御史時接伴遼使張觀中丞教之曰待之以禮答之以簡戡佩服其言或云不然使人見人語簡便生疑心激惱人不若曠然以誠接之吕文靖教馬子山云事不要做到十分子山初未諭其後語人云一生只用此一句不盡李若谷教一門生云清勤和緩門人曰清廉勤瘁和同則聞命矣緩安可為也李公曰天下甚事不是忙後壊了韓稚圭教一門生云穏審著大事將做小事做小事將做大事看胡瑗教人心中稍疑事便不要做永叔言觀人題壁便可知其文章熈寜中福建賊廖恩攻剽數郡殺害捕盗官東南為之騷然凡恩所經渉監司守將皆坐貶絀其餘相連得罪者不可勝計既乃招降予官朝廷以其悍勇頗任使之一旦恩至三班院供家状云自出身歴任以来竝無公私過犯有一班行李師益亦同供状乃云前任信州廵檢為廖恩事勒停都下相傳以為笑焉杜祁公為樞密使内降某人與近上班行停之數日同列促之不聽中使宣催公翌日奏某人是誰奏請容商量初不宣諭再三論之方云是貴妃誕育時產媪之子又再三論之只除三班借職又求監都商税院公奏云此係三司舉官一歲四十萬貫税額堅持不可猶得南排岸大内都知張惟吉請諡禮官以吉前持温成喪不當居皇儀殿一夕争之至明時宰阿䛕順旨惟吉頓足泣下縁此得諡忠惠陳執中以不正諫前事至死禮官諡曰榮靈晏丞相知南京王琪張亢為幕客泛舟湖中只以諸妓自隨晏公把柁王張操篙琪南方人知行舟次第至橋下故使船觸柱而横厲聲呼曰晏梢使柁不正也范希文知鄧州是時法網踈濶監司尚預游宴張去惑為提㸃刑獄醉中起舞既而曰啓諫議壊了提刑也朱柬之自言作滁州推官時歐陽永叔為太守杜彬作倅曉音律永叔自琅琊山幽谷亭醉歸妓扶歩行前引以樂彬自亭下舞一曲破直到州衙前凡一里餘永叔詩云杜彬琵琶皮作絃元祐五年彬子焯在金陵或問皮何以作絃焯云永叔詩詞之過也琵琶誠好乃國初老聶工造世間只有四面今尚收藏在家但無皮絃事爾朱柬之云昔年為宿州符離令孫元規以節副安置每来縣中打毬射弓後以禮部侍郎致仕英宗即位起知慶州元規私語朱云當時作樞副以不讀温成冊出於水闗外濮王送書相别稱羙其節槩亦有書答之後来騐書乃英宗詢翰今日一起其端自此人事倚伏不可知也唐子正桂州人為舉人時入京道中遇一道人服破敝人皆疑其盜也疎之道人者辭去留一詩與蔡州門卒候唐過予之騐其日乃辭去之日也相去已十程矣詩曰知汝有心求富貴到頭無分學神仙又云直待角龍危燕會好来黄壁卧林泉後三十年子正以太子中舍通判邕州交阯入城子正自縊於官舍壁下乃熈寜九年正月二日也歲在丙辰故曰角龍正月二日危月燕直日故曰危燕予児童時已聞此詩騐於三十年後乃知交阯一覆三州殺人無數亦非偶然爾賈易以諌官責知懐州替鄭佾赴闕李之儀夢鄭佾依舊知懐州數數對親朋言此夢既而易以到官上表再貶知廣徳軍佾已知單州待闕尚逺自言于朝廷復以懐州還佾之儀之夢遂騐吳充病贅仁宗見之揜鼻既而諭執政者曰充病矣其後執政進擬差除不敢公去充但於姓名下小書病字以是終仁宗世充罕至京師一旦神宗即位充歴踐二府日在上左右其贅比舊加大宂且腥甚而上不惡焉則夫命之至也雖病也有物盖之矣滕元發云一善醫者云取本草白字藥服之多騐蘇子容云黑字是後人益之宋次道云唐三百年惟薛苹為滑帥田𢎞正為魏帥興河役力省工倍它時未嘗略為患也館中同列疾王文穆使陳越寝如文穆之屍石中立作文穆之妻哭其傍餘人歌虞殯於前後欽若聞之密奏將盡逐之王文正持其奏不下蘇渙郎中押伴夏人云賣銀五千兩買樂人幞頭四百枚薰衣香龍腦朱砂凡數百兩及買綾為壁衣陳執中作相杜祁公引年一表便許止除少師物論喧然富彦國在鄆葉道卿在青皆不平之執中守亳病甚累表乞致仕不允移曹南卧京第者踰年又五年方許致仕是時富公作相欲矯前事耳猴部頭猿父也衣以俳優服常在昭宗側梁祖受禪張御筵引至坐側熟視梁祖忽奔走號躑褫其衣冠全忠大怒叱令殺之唐之舊臣無不愧怍陳靖為吏部員外郎曉三命自言官髙夀長一旦卒附婢子語平生最厚薛向向往見之婢子冠帶而出語言動作真靖也向問吏部平生自知命何乃至此答云某甚有官夀皆如術數但以不塟父母乃被尅折既而泣下向欲質以一事乃問以隂中善惡之報靖言世間所傳皆不誣也只如張退傳官職夀康人所仰望然酆都造獄明年三月成矣不可不戒也向密記其説明年車駕游池宣召張士遜士遜至向適於稠人中望見之以為士遜精健如此鬼語乃妄言耳明日聞士遜薨矣郭逵伐交州行師無紀律其所措置殆可笑也進兵有日矣乃付諸將文字各一大軸謂之將軍下令字畫甚細節目甚繁又戒諸將不得漏洩諸將近燈火竊觀之徐禧嘗見之云如一部尚書多禧三日夜讀之方竟則諸將倉猝之際何暇一一觀也内一事云一交人好乘象象畏猪聲仰諸將多養猪如象到以錐刺猪猪既作聲象自退走余靖不修飾作諌官乞不修開寳㙮時盛暑上入内云被一汗臭漢薫殺噴唾在吾面上永叔夢為鸜鵒飛在樹上意甚快悦聞榆莢香特異永叔嘗自言上有一兄未晬而卒母哭之慟夢神人别以一子授之白毫滿身母既娠白毫無數永叔生毛漸退落宋庠罷叅鄭戩罷樞葉清臣罷計吳安道罷尹盖吕文靖惡其黨盛也時數公多以短封廋詞相往来如青骨不識字米蓆子作版之𩔖青骨謂􅃽堂時諺謂知制誥為識字待制為不識字楊吉作發運以餉權要得户部副使李昭遘修撰自河中移知晉州云母夫人年八十矣事姑二十年唯梳髪髻姑亡始戴冠今士大夫家子婦三日已冠而與姑宴飲矣吕文穆薄遊一縣胡旦隨父宰邑客有譽吕舉其詩云挑盡寒燈夢不成胡笑曰乃是一渇睡漢耳吕明年中甲寄聲胡曰渇睡漢状元及第矣胡答曰待我明年第二人及第輸君一籌次榜果中首選舉子以巨軸獻胡旦旦覽之曰㫖哉㫖哉王介得知常州劉貢甫以語謔之介曰貢甫非豈弟君子乎貢甫曰雖非豈弟君子却是打爺知州常州風俗毆父有橋名曰打爺橋白黒簡心此東漢書語也或以命謝師直之告譏其好奕也蔡立知江州後娶崔氏生一女前妻一子娶袁轂之女病瘵而死凴於崔氏之女凡語言皆怨其後母之薄也云人死皆有一蟲轉以付人以與崔氏之女又以其先亾母勸之令勿自殘賊親戚今不與矣其始已議攅殯袁氏云吾無児女它日誰塟我者不如焚我也比至火作之時𡊮氏所凴之語忍痛之聲聞於外焉沈文通説故三司副使陳洎卒後婢子附語云坐不塟父母當得為貴神今為賤鬼足脛皆生長毛福州奏販鹽賊謀者四五人従者四十人大理斷官趙衍審刑詳議祝諌盡斷死罪衍尋卒臨命自語曰寃枉殺人祝諌通判揚州未幾亦卒知江州瑞昌縣畢従範素健無所苦一夕㑹客客前燭皆明惟従範前燭數易屢滅是夕暴病卒盖隂氣先有所薄爾知䖍州朝議李大夫自云凡二十五子今所有一子也其母以屢失子於病風作時嚙臂志之比再生子齒痕隠然在其臂乃知輪㢠廻再生之説為不誣爾太祖建隆六年議改元語宰相勿用前代舊號改元乾徳後於内人鏡背有乾徳之號學士陶榖曰此偽蜀年號也太祖由是益重儒士國家開寳中錢文曰宋通元寳至寳元中則曰皇宋通寳近世錢文皆著年號惟此二錢不然者以年號有寳字故也太宗時宋白賈黄中李至吕䝉正蘇易簡五人同拜翰林學士承㫖扈蒙贈詩云五鳳齊飛入翰林其後皆為名臣御史䑓故事三院御史言事必先白中丞自劉子儀為中丞始榜䑓中御史有所言不須先白中丞至今如此真宗雖以文詞取士然必視其器識每賜進士及第必召髙第三四人竝列於庭更察其形神磊落者始賜第一人及第或取其所試文詞有理􅃐者徐奭鑄鼎象物賦云足惟下正詎聞公餗之欹傾鉉乃上居實取王臣之威重遂以為第一蔡齊置器賦云安天下於覆盂其功可大遂以為第一故事學士在内中院吏朱衣雙引太祖朝李昉為學士太宗在南衙朱衣一人前引昉因去其一往時學士入劄子不著姓但云學士某盛度丁度竝為學士遂著姓以别之後皆著姓吕文穆公䝉正為相有朝士藏古鑑能照二百里欲因弟獻以求知公曰吾面不過楪子大安能照二百里聞者歎服以為賢於李衞公逺矣唐人奏事非表非状者謂之榜子亦曰録子今謂之劄子真宗臨軒䇿士夜夢下有菜一苖甚盛與殿基相髙及拆第一卷是乃蔡齊上見其容貌曰得人矣特詔執金吾七人清道自齊始范仲淹字希文知開封府事决事如神京師謡曰朝廷無憂有范君京師無事有希文每奏事多陳治亂歴詆大臣不法言者以仲淹離間君臣落職知饒州寳元中元昊叛上知其才兼文武起帥延安日夕訓練精兵賊聞之曰無以延州為意今小范老子腹中有數萬甲兵不比大范老子可欺也戎人呼知州為老子大范謂雍也後知慶州時王師定川之敗議㸃鄉軍仲淹令刺其手及兵罷還慶路皆復得為農上以四路諸招討委之仲淹與韓琦謀必欲収復靈夏横山之地邉上謡曰軍中有一韓西賊聞之心骨寒軍中有一范西賊聞之驚破膽元昊聞而懼之遂稱臣陳堯佐字希元修真宗實録特除知制誥舊制須召試唯楊億與堯佐不試而授兄堯􅅱弟堯咨皆舉進士第一時兄弟貴盛當世少比堯佐退居鄭圃尤好詩賦張士遜判西京以牡丹花及酒遺之堯佐答曰有花無酒頭慵舉有酒無花眼懶開正向西園念蕭索洛陽花酒一時来狄青字漢臣元昊叛屢將兵出戰四年間大小二十五陣八中流矢人呼為狄天使上觀其儀表曰朕之關張也於是有敵萬之稱謂以一足以敵萬也初青在軍伍間韓魏公范文正公一見之皆稱其有將相之器果能為國立功為時名將王旦字子明為翰林學士嘗奏事下殿真宗目送之曰與朕致太平必斯人也後拜平章事外撫諸邊内安百姓官吏得職天下富庶頌聲洋溢旦之力也石介字守道徂徕山人也文章學術天下宗師皆呼為徂徕先生著宋頌十篇猗那清廟無以加也慶厯三年天下所謂賢士大夫必用於兩府侍従䑓諌之官宋之用人於兹為盛介作慶厯聖徳詩范文正公幼孤隨母適朱氏因冒朱姓後復本姓啓曰志在投秦入境遂稱於張禄名非覇越乗舟乃效於陶朱以范睢范蠡嘗改姓故也偽蜀范禹稱亦嘗冒張姓謝啓云昔年上第誤標張禄之名今日故園復作范睢之裔然不若文正謝啓之精切也景徳中夏文荘公初授館職時方早秋上在拱辰殿按舞命中使索新詞公立進喜遷鶯曰霞散綺月沉鈎簾捲未央樓夜􅈵河漢截天流宫闕鎖新秋瑤堦曙金莖露鳳髓香和雲霧三千珠翠擁宸游水殿按梁州上大悦王文康公詩云棗花至小能成實桑葉雖柔解吐絲堪笑牡丹如斗大不成一事又空枝亦重厚者之辭也裴晉公作鑄劍㦸為農器賦云我皇帝嗣位三十載寰海鏡清方隅砥平駈域中盡歸力穡示天下弗復用兵則平淮西一天下已見於此賦矣范文正公作金在鎔賦云如令區别妍媸願為軒鑑若使削平禍亂請就干將則公負將相器業文武全材亦見於此賦矣公為水車賦云方今聖人在上五日一風十日一雨則斯車也吾其不取意謂水車唯施於旱不旱則無所施公在寳元康定間邉鄙有事驟加進擢晏静則置而不用亦與水車何異王沂公有物混成賦云不縮不盈賦象寜窮於廣狹匪彫匪斵流形罔滯於盈虚則宰相陶鈞之意可見矣又云得我之小者散而為草木得我之大者聚而為山川則擇任掄材使大小各得其所又可見矣寇凖以員外郎奏事直言觸犯太宗怒而起凖遽以手引赭袍請上復御坐親决其事乃退上嘉納之太宗曰朕得寇凖如唐太宗得魏鄭公太平興國七年季冬大雪上賜學士詩曰輕輕相亞凝如酥宫樹花装萬萬株今賜酒卿時一盞玉堂閒話道情無錢俶進寳帶太祖曰朕有三條帶與此不同俶請宣示上笑曰汴河一條惠民河一條五丈河一條俶大愧服夏英公言楊文公文如錦繡屏風但無骨耳議者謂英公文譬如泉水迅急湍悍至於浩蕩汪洋不如文公也田元均治成都有聲有訴訟其懦弱不能自伸者必委曲問之蜀人謂之照天蠟燭劉隨待制為成都通判嚴明通逹人謂之水晶燈籠仁宗暑月不揮扇以拂子敺蚊蠅而已冬月不須爐醫者云體備中和之氣則然姚跂囘云自来奉使北朝禮遇之厚無如王拱辰預釣魚放鶻之會皇帝親御琵琶以侑酒是時先父館伴相得甚歡拱辰謂先父曰南朝峭漢推吾異日先父為上道此語上曰拱辰答問似此語言極多其才器不在人下然識量不足難於逺到吾見奉使之人惟富弼不可量也因問南朝如卿人才有㡬弼曰臣斗筲之器不足道也本朝人才勝如臣者車載斗量不可數計察斯人大未可量也談苑卷三
