body:
  text: 談苑小說家類一雜事之屬提要臣等謹案談苑四卷舊本題宋孔平仲撰平仲有珩璜新論已著録是書多録當時瑣事而頗病叢雜趙與時賓退録嘗駁其記吕夷簡張士遜事謂以宰相押麻與當時體制不合疑為不知典故者所為必非孔氏真本今考其所載往往與他書相出入如梁灝八十二為狀元一條見於遁齊閒覽錢俶進寶𢃄一條王禹玉上元應制一條見於錢氏私志宰相早朝上殿一條見於王文正筆録上元燃燈一條詔敕用黃紙一條見于春明退朝録寇萊公守北門一條見于國老談苑其書或在平仲前或與平仲同時似亦托拾成編之一證至于王雱才辨傲狠新法之行雱實有力而稱之為不慧殊非事實至張士遜死入地獄等事尤誕幻無稽不可為訓與時所論未可謂之無因姑以宋人舊本存備參稽云爾乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0a37a5b38efebef36e422618baca0069542e8a4005d1424884cd0db3a20075b0
