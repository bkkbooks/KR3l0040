body:
  text: 談苑小説家𩔖一雜事之屬提要臣等謹案談苑四卷舊本題宋孔平仲撰平仲有珩璜新論已著録是書多録當時瑣事而頗病叢雜趙與旹賓退録嘗駁其記吕夷簡張士遜事謂以宰相押麻與當時體制不合疑為不知典故者所為必非孔氏真本今考其所載往往與他書相出入如梁灝八十二為狀元一條見於遯齋閒覽錢俶進寶𢃄一條王禹玉上元應制一條見於錢氏私志宰相早朝上殿一條見於王文正筆録上元燃燈一條詔勅用黄紙一條見于春明退朝録㓂萊公守北門一條見于國老談苑其書或在平仲前或與平仲同時似亦摭拾成編之一證至于王雱才辨傲狠新法之行雱實有力而稱之為不慧殊非事實至張士遜死入地獄等事尤誕幻無稽不可為訓與旹所論未可謂之無因姑以宋人舊本存備叅稽云爾乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b5d49ab989e7ad7b350c3e8fbf9c0a21b9386a438021b299103fed56e5592727
