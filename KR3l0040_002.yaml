body:
  text: 談苑卷二宋孔平仲撰熙河之師上意甚欲得木征以內殿崇班錢五千貫購之熙寧六年木征降于常河諾城王韶奏以為令王君萬韓存寶招呼李憲奏以為與燕逹納其欵韶憲爭功隙由此啓上嘗對召惠卿稱憲禽木征之功蓋憲之面奏詳于韶之條奏故也安南之師上欲遣憲與趙禼往韶時在樞府與王安石共爭之由是罷憲而遣郭逺上不平二公之爭使憲舉河西既而逵敗績而憲有功故上益以憲為可用焉髙若訥作中丞與小黃門同監修祭器遂同書奏狀議者非一寶元中夏英公以陳恭公不由儒科驟躋大用心不平之恭公亦傾英公英公除集賢有臺章恭公啓換為樞密使英公知之意愈怏怏是時西北有警英公能結內官又得上心乃撰一䇿題如䇿試制科者教仁宗以試兩府大臣欲以窮恭公之不學也一日仁宗御資政殿見兩府出此題署云付陳執中等兩府跽受開讀次已見小黃門設矮卓子具筆硯矣英公色欲揮翰其餘皆愕然相視末知所為宋鄭公徐奏曰陛下所問皆臣等夙夜謀謨之事臣等不職陛下責之可也若䇿試乃朝廷所以待草茅之臣臣備位執政不可下同諸生乞歸中書令中書密院各具所見以對仁宗俯首面赤云極是極是既退恭公謂鄭公曰適來非公之言幾至狼狽鄭公曰某為國惜體非為諸君地也中書所對皆出鄭公之筆極攻密院之失是時顯立仇讐矣人言紛紛英公不自安欲晦其迹又撰一䇿題故為語言參差或失黏或不對欲如禁中親制者教仁宗以䇿試兩府兩制然間有三兩句絶好處人亦識其為英公詞也仁宗寬容亦聽之一日召兩府兩制對于迎陽門又出此題付之然英公之迹終不能晦焉孫奭尚書侍讀仁宗前上或左右瞻視或足敲踏牀則拱立不讀以此奭每讀書則上體貌益莊王隨佞佛在杭州常對聾長老誦所作偈此僧既聵離席引首幾入其懷實則不聞也隨嘆賞之以為禪機之妙仁宗祫享之際雪寒特甚上奉玉露腕侍祠諸臣袖手執笏見上恭䖍皆恐惕揎袖神宗以星變祗懼許人上封事言得失於是王安禮上書語頗訐直上微不悅以示王圭圭曰觀安禮所言皆是臣等執政後來事無一字及安石所為者其意蓋怨望安石在外専欲譏切臣等耳安禮每對臣言云似爾名位我亦須做上笑曰大用豈不在朕而安禮狂妄自許如此後一年安禮自翰林學士遷尚書右丞修內前涉子木計用方團三千三百條再差職方員外郎陳昭素計之只用三百條京城侵竊之弊如此昭素勾當三司修造案半年減十五萬議者云可罷陜西買木一年雷太簡判設案御厨每日支麵一萬斤後㸃檢每日剩支六千斤先日宰羊二百八十後只宰四十頭江鄰幾云南郊賞給舊七百萬今一千二百萬官人俸皇祐中四千貫今一萬二千貫合同司歲㑹支左藏庫錢八九萬貫近歲至三十五六萬貫祿令皇太子料錢千貫無公主料錢例宋次道云李長主在宫中請十千晚年增至七百千福康出降後月給千貫景德中天下二萬五千寺今三萬九千寺陳述古判祠部云章伯鎮勘㑹省案歲給椽燭十三萬條內酒坊祖宗朝糯米八百石真廟三千石仁宗八萬石江南民言正旦晴萬物皆不成元豐四年正旦九江郡天無片雲風日明快是年果旱又曰芒種雨百姓苦蓋芒種須晴明也春雨甲子赤地千里夏雨甲子乘船入市乘船入市者雨多也又于四月一日至四日卜一歲之豐凶云一日雨百泉枯言旱也二日雨傍山居言避水也三日雨騎木驢言踏車取水亦旱也四日雨餘有餘言大熟也禪師惠南嘗言上元一夕晴麻小熟兩夕晴麻中熟三夕晴麻大熟若隂雨麻不登占亦如此云絶有效驗京東一講僧云雲向南雨潭潭雲向北老鸛尋河哭雲向西雨沒犁雲向東塵埃沒老翁言雲向南與西行則有雨向北與東行則無雨云亦有效驗大理少卿杜純云京東人言朝霞不出門暮霞行千里言雨後朝晴尚有雨也須晚晴乃真晴耳九江人畏下旬雨云雨不肯止劉師顔視月占旱云月如懸弓少雨多風月如仰瓦不求自下同州人謂雨沾足為爛雨金陵夏氏能致紫姑神神能屬文其書畫似唐人應對機捷蔣山法泉長老曰問仙姑求一偈子神云神拜來不惜口中口你為說破泉曰試說看神曰咄泉曰也是外學之流神曰法泉曰公案未了神曰將拄杖來良久書頌曰鍾山鍾山今古長閒天邉雲漠漠澗下水潺潺或寫此一假語寄示李之儀曰寃哉法泉被三姑摧折之儀答曰法泉所謂雪上加霜也司馬遷誤以子我為宰我又以燕簡公欲盡去諸大夫而立其寵人作寵姬紫姑者厠神也金陵有致其神者沈遘嘗就問之即畫粉為字曰文通萬福遘問仙姑姓答云姓竺南史竺法明乃吾祖也亦有詩贈遘近黃州郭殿直家有此神頗黠捷每歲率以正月一日來二月二日去蘇軾與之甚狎常問軾乞詩軾曰軾不善作詩姑書灰云猶裏猶裏軾云軾非不善但不欲作爾姑云但不要及它新法便得也人畜鷺鷥雖馴熟然至飲秋水則飛去京師夏間競養銅觜至九月多死鴟生三子內一子則鷹也然鴟多生兩子也小池中魚至九月十月間宜取投大水中不爾冬間俱凍死鯇魚惟食草人刈草以飼之至八月則不食至三月復食如初馬子蒸其母則生駁馬此逆亂之氣所為也雞舌香即丁香也日華子云雞舌香治口氣故郎官含雞舌香取其便於奏對正是今之丁香舌方五香連翹湯用雞舌香千金五香連翹湯無雞舌香却有丁香最為明驗俗醫取乳香中如柿核無氣味者謂之雞舌香殊無干涉新補本草重出二物蓋考之未精也海東麻子大如蓮實陜西極邉枸杞大可柱葉長數寸人有在韶州見自然銅黃如金粉價直於金卲化及為髙麗國王治藥云人參極堅用斧斷之香馥一殿今之醫者治病少效殆亦藥材非良也仁宗朝王圭上言請以正月為端月為與上名音相近也歐陽永叔作校勘時夢入一廟於庭下謁神與丁元珍同列而元珍在上廟前有石馬無一耳後責夷陵元珍為判官同謁黃牛廟元珍職官在縣令上廟前有石馬無一耳宛如昔夢所見焉陳州有顓頊廟狄青知州日夢廟中有榜題曰宰相蔡確確是時方為舉人青訪知姓字召見之語以所夢云善自愛確後果相神宗皇帝王汾作館職忤王荆公意判鼓院凡四年家貧俸薄纍乞外任不許一夕夢神告之曰子欲得郡須求元公是時元厚之為參知政事汾亟往禱之厚之云荆公意思不婉順未可議也然荆公屢爭事不合恐旦夕出矣姑少俟之未幾荆公果出金陵吳冲卿當國汾又禱即日得兖州到官數月尋繹此夢所謂元公乃兖州也林希於章衡榜下及第在期集處劉庠相揖云久欲相見有小事言之希問其故曰庠嘗夢登第在公後三名故識公也希自計唱第時劉庠始在第三甲以前舉不曾赴殿試今舉直赴殿試例降一等作第四甲頭又隔數十名方喚到希以希嘗為南廟解元仁宗令升綴第三甲未至第五甲喚到李實實南省解元也仁宗又令升綴第三甲既而又令置希之上明日唱明經第張巨已於第四甲進士登科又中明經是時中兩科者例升一等於是升綴第三甲未自希數至劉庠正是第三名凡兩日之間更四人者方符一夢焉元豐間內臣李憲專領西方之事葉康直為轉運使以糧草不辦一日有御寶劄子付憲葉康直遽斬訖奏憲近習也祕而不宣自料云不過中夕必别有指揮中夕扣門甚急果有劄子葉康直至以上劄示之云須至奉押矣遂枷項送渭州取勘既而康直卒無事任使如故今以龍閣作帥秦州王荆公初拜僕射握壻蔡卞手曰吾止於此乎昔年作舉人時夢升一㕔事人指其榜有僕射㕔字曰他日君當為此官今夢驗矣官制行換為特進元祐初加司空卞幸其夢之不應也公讓不拜半年方報再讓又數月方報此告下公薨八日矣竟終於特進焉卞為豫言如此王曾在青州為舉人時或令賦梅花詩曾詩云而今末說和羮用且向百花頭上開識者已許曾必狀元及第仕宦至宰相王琪知歙州吳感作折紅梅小詞寄之云山花冷落何曾折一曲紅梅字字香王介甫有江寧夾口詩云茅屋滄洲一酒旗午烟孤起隔林炊江清日暖蘆花轉恰似春風桞絮時人或題之於壁續其後云江南村裏老翁子不解吟他富貴詩荆公聞之但笑而已劉攽貢甫性滑稽喜嘲謔與王汾同在館中汾病口吃攽為之贊曰恐是昌家又疑非類未聞雄鳴只有艾氣周昌韓非揚雄鄧艾皆古之吃者也熙寧中為考官出臨民以教思無窮論舉人上請曰此卦大象如何攽曰要見大象當詣南御苑馬默為臺官彈奏輕薄不當置在文館攽曰既云馬默豈合驢鳴吕嘉問提舉市易曾布劾其違法反得罪嘉問治事如故攽曰豈意曾子避席望之儼然嘉問字望之石中立字曼卿初登第有人訟科場覆考落數人曼卿是其數次日被黜者皆受三班借職曼卿為詩曰無才且作三班士請士爭如録事參從此罷稱鄉貢進且須走馬東西南後試館職為直學士性滑稽善戲謔嘗出馭者又失鞍馬驚曼卿墜地從吏遽扶掖升鞍曼卿曰賴我石學士若瓦學士豈不破次遷郎官有上官弼郎中勸以謹口對曰下官口干上官鼻何事一日又改授禮部郎中時相勉之曰主上以公清通詳練故授此職宜減削詼諧對曰某授誥云特授禮部郎中餘如故以此不敢減削天禧為員外郎時西域獻獅子畜于御苑日給羊肉十五斤率同列往觀或曰吾輩忝預郎曹反不及一獸石曰若何不知分彼乃苑中獅子吾曹園外狼耳安可並耶續除參政在中書堂一相曰取宣水來石曰何也曰宣徽院水甘冷石曰若司農寺水當呼為農水也坐者大笑王汾嘲劉攽云常朝多喚子蓋常朝知班吏多云班班謂之喚班攽應聲曰寒食每尋君蓋呼汾為墳耳元祐二年辛雍自光祿寺丞移太常博士顧子敦自給事中除河朔漕付以治河京師語曰治禮已差辛博士修河仍用顧將軍子敦好談兵人謂之顧將軍也蘇子瞻與姜濳同坐濳字至之先舉令云坐中各要一物是藥名乃指子瞻曰君藥名也問其故對曰子蘇子瞻應聲曰君亦藥名也君若非半夏便是厚朴問其故曰非半夏厚朴何故謂之薑製之李公擇於祕書省種竹云使後人見之曰此李文正手植之竹也蓋自許他日諡文正也劉貢父適聞之曰李文政不特能繫筆又善種竹邪是時京師有李文政善繫筆士大夫多用之邢恕有文學辨論然多不請而教人士大夫謂之邢訓竟坐教朝士上書奪中書舍人出知隨州後自襄州移領河陽彭器資作告詞云勉蹈所聞無煩多訓蓋譏之也孫莘老為御史中丞不甚言事以疾辭位得宫觀劉貢父作告詞云未得聞生之竒論今乃以疾而固辭亦譏之也朝士趙昶有兩婢善吹笛知藤州日以丹砂遺子瞻子瞻以蘄笛報之并有二曲其詞甚美云木落淮南雨晴雲夢日斜風裊又云自桓伊不見中郎去後孤負秋多少斷章云為使君洗盡蠻風瘴雨作清霜曉昶曰子瞻罵我矣昶南雄州人意謂子瞻以蠻風譏之劉子儀侍郎三入翰林意望兩府頗不懌移疾不出朝士問候者但云虛熱上攻石中立在坐云只消一服清涼散便安矣蓋謂兩府始得青涼傘也張唐公諡錢思公作文墨公諸子服絰邀執政訴之石中立指其幼者云此東山一寸金也林瑀王洙同作直講林謂王曰何相見之濶也王曰遭此霖雨瑀云今後轉更疏濶也王曰何故答云逢這短晷蓋譏王之侏儒館中鐡火罩鄭天體戲王原叔云此王將軍兜鍪亦謂其侏儒也狄青王伯庸同在樞密府王常戲狄之涅文云愈更鮮明狄云莫愛否奉贈一行伯庸為之大慙真宗東封訪天下隱士得杞人楊朴上問曰卿臨行有人贈詩否朴對曰臣妻一首云更無落魄耽杯酒切莫猖狂愛詠詩今日捉將官裏去這回斷送老頭皮上大笑使之復還山梁灝八十二歲雍熙二年狀元及第謝啓云白首窮經少伏生之八歲青雲得路多太公之二年後終祕書監真宗朝李沆王旦同執政四方奏報祥瑞沆固滅裂之如有災異則再三數陳以為失德所招上意不悅旦退謂沆曰相公何苦違戾如此似非將順之意沆曰自古太平天子志氣侈盛非事奢侈則耽酒色或崇釋老不過以此數事自敗今上富於春秋須常以不如意事裁挫之使心不驕則可為持盈守成之主沆老矣公它日當見之旦猶不以為然至晚年東封西祀禮無不講時沆已薨旦繪像事之每胸中鬱鬱則摩腹環行曰文靖文靖蓋服其先識也文靖沆諡也駕頭者祖宗即位時所坐也相傳寶之中使出外勾當皆責知委狀敢妄奏它事皆伏軍令祖宗舊制也真宗禁銷金自東封歸杜偼妤者昭憲太后之姪女也迎駕服之上怒送太和宫出家由此人莫敢犯陸經多與人寫碑銘頗得濡潤人有問子履近日所寫幾何對曰近日寫甚少總在街上喝道行裏施黔州多白花蛇螫人必死縣中板簿有退丁者非蛇傷則虎殺之也州連蠻獠三月草長蛇盛則蛇防戌至九月草衰蛇向蟄則又防秋矣居民造毒藥取蛇倒懸之以刀刺其鼻下以器盛其血第一滴下用以毒人立死故也取第二第三四者每血一滴以麵和作四丸中此毒者先吐血須㬰五臟壅滿潰爛李純之少監云惟朱砂膏可治此毒純之以藥救人無數仍刻其方以示土民吳長文使遼遼人打圍無所獲忽得一鹿請南使觀之須㬰剝剔了已昏夜矣數兵煮其骨食之皆嘔血吳左丞留雙腎於銀器中云此最補暖旦欲薦之翌日銀器內皆黑色乃毒矢所斃爾不敢泄埋之而去遼地大寒匕箸必於湯中蘸之方得入口不爾與熱肉相沾不肯脫石鑑奉使不曾蘸箸以取榛子沾脣如烙皮脫血流淋漓衣服上丁諷病廢常令兩女奴掖侍見客於堂中諷之病以好色既廢亡賴益求妙年殊質以厭其心客出不能送又令一婢子送至中門曰謝訪以故賔客之至者加多乃愈於未病時蓋其來不專為諷也宰臣食邑滿萬始封國公郊禮前省內官衣錦後省衣繡後苑銀作鍍金為水銀所薰頭手俱顫賣餅家窺爐目皆早昏賈谷山采石人石未傷肺肺焦多死鑄錢監卒無白首者以辛苦故也丁諷以館職病風廢於家一旦有妄傳諷死者京師諸公競致奠儀紙酒塞門諷曰酒且留之紙錢一任别作使用諷方乏資由是獲美醖盈室焉石曼卿王氏壻也以館職通判海州官滿載私鹽兩船至夀春託知州王子野貨之時禁網寬賖曼卿亦不為人所忌於是市中公然賣學士鹽真皇上仙執政因對奏冦凖與南行一郡丁謂至中書云雷州司户王曾參政云適來不聞有此指揮丁云居停主人宜省言語王悚息而已蓋王是時僦冦宅而居晏殊言作知制誥日誤宣入禁中時真宗已不豫出一紙文書視之乃除拜數大臣殊奏云臣是外制不敢越職上頷之召到學士錢惟演殊奏臣恐泄漏乞只宿學士院翌日麻出皆非向所見者深駭之而不敢言也談苑卷二
